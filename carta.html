<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dulce Beba — Carta</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EE;
    --warm-white: #FFF9F4;
    --blush: #F2C4B0;
    --dusty-rose: #D4897A;
    --terracotta: #B85C45;
    --chocolate: #3D1F1A;
    --caramel: #C8843F;
    --sage: #8FAF8A;
    --sky: #A8C4D4;
    --text: #2A1510;
    --text-soft: #7A5A52;
    --card-bg: rgba(255,255,255,0.75);
    --shadow: 0 4px 24px rgba(61,31,26,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ─── BACKGROUND TEXTURE ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(242,196,176,0.35) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(200,132,63,0.18) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 40%, rgba(168,196,212,0.12) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  main { position: relative; z-index: 1; }

  /* ─── HEADER ─── */
  header {
    text-align: center;
    padding: 48px 24px 32px;
    position: relative;
  }

  .logo-wrap {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    background: white;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 32px rgba(184,92,69,0.18), 0 2px 8px rgba(61,31,26,0.08);
    overflow: hidden;
    animation: fadeDown 0.7s ease both;
  }

  .logo-wrap img {
    width: 88px;
    height: 88px;
    object-fit: contain;
  }

  .logo-fallback {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: var(--terracotta);
    line-height: 1;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 700;
    color: var(--chocolate);
    letter-spacing: -0.5px;
    animation: fadeDown 0.7s 0.1s ease both;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-soft);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 6px;
    font-weight: 300;
    animation: fadeDown 0.7s 0.2s ease both;
  }

  /* ─── SEARCH ─── */
  .search-wrap {
    padding: 0 20px 8px;
    max-width: 500px;
    margin: 0 auto;
    animation: fadeDown 0.7s 0.3s ease both;
  }

  .search-box {
    width: 100%;
    padding: 14px 20px 14px 48px;
    border: 1.5px solid rgba(184,92,69,0.2);
    border-radius: 50px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }

  .search-box:focus {
    border-color: var(--terracotta);
    box-shadow: 0 0 0 3px rgba(184,92,69,0.1);
  }

  .search-box::placeholder { color: var(--text-soft); }

  .search-icon {
    position: absolute;
    left: 36px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-soft);
    font-size: 17px;
    pointer-events: none;
  }

  .search-container { position: relative; }

  /* ─── CATEGORY PILLS ─── */
  .cats-wrap {
    padding: 16px 16px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    animation: fadeDown 0.7s 0.35s ease both;
  }

  .cats-wrap::-webkit-scrollbar { display: none; }

  .cats {
    display: flex;
    gap: 8px;
    width: max-content;
    padding: 0 8px;
  }

  .cat-btn {
    padding: 9px 18px;
    border-radius: 50px;
    border: 1.5px solid transparent;
    background: rgba(255,255,255,0.7);
    font-family: 'DM Sans', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cat-btn:hover {
    background: rgba(255,255,255,0.95);
    border-color: var(--blush);
    color: var(--terracotta);
  }

  .cat-btn.active {
    background: var(--terracotta);
    color: white;
    border-color: var(--terracotta);
    box-shadow: 0 4px 12px rgba(184,92,69,0.3);
  }

  /* ─── FEATURED STRIP ─── */
  .featured-strip {
    padding: 12px 20px 4px;
    animation: fadeDown 0.7s 0.4s ease both;
  }

  .featured-label {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--caramel);
    font-weight: 500;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .featured-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(200,132,63,0.3), transparent);
  }

  .featured-cards {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 4px;
  }

  .featured-cards::-webkit-scrollbar { display: none; }

  .feat-card {
    min-width: 160px;
    background: linear-gradient(135deg, var(--terracotta), var(--dusty-rose));
    border-radius: 20px;
    padding: 18px 16px;
    color: white;
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .feat-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 28px rgba(184,92,69,0.35);
  }

  .feat-card::before {
    content: '';
    position: absolute;
    top: -20px;
    right: -20px;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
  }

  .feat-card .feat-emoji { font-size: 26px; margin-bottom: 10px; display: block; }
  .feat-card .feat-name { font-size: 14px; font-weight: 600; line-height: 1.3; }
  .feat-card .feat-price { font-size: 13px; opacity: 0.85; margin-top: 4px; }
  .feat-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    background: rgba(255,255,255,0.25);
    border-radius: 20px;
    font-size: 10px;
    padding: 3px 8px;
    font-weight: 500;
  }

  /* ─── SECTION TITLE ─── */
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-style: italic;
    color: var(--chocolate);
    padding: 20px 24px 4px;
  }

  /* ─── PRODUCT GRID ─── */
  .products {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 12px 16px;
  }

  @media (min-width: 500px) {
    .products { grid-template-columns: repeat(3, 1fr); }
  }

  @media (min-width: 700px) {
    .products { grid-template-columns: repeat(4, 1fr); }
  }

  .product-card {
    background: var(--card-bg);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    border: 1px solid rgba(255,255,255,0.8);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    animation: fadeUp 0.4s ease both;
  }

  .product-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 32px rgba(61,31,26,0.14);
  }

  .product-card.hidden { display: none; }

  .product-emoji-wrap {
    width: 100%;
    padding-top: 72%;
    position: relative;
    background: linear-gradient(135deg, var(--warm-white), var(--cream));
  }

  .product-emoji-inner {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
  }

  .product-info {
    padding: 12px 12px 14px;
  }

  .product-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--chocolate);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .product-desc {
    font-size: 11.5px;
    color: var(--text-soft);
    line-height: 1.4;
    margin-bottom: 8px;
    font-weight: 300;
  }

  .product-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .product-price {
    font-size: 15px;
    font-weight: 700;
    color: var(--terracotta);
    font-family: 'Playfair Display', serif;
  }

  .wa-btn {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--sage);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 15px;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
    flex-shrink: 0;
  }

  .wa-btn:hover {
    background: #5d9a6e;
    transform: scale(1.1);
  }

  .tag-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 20px;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .tag-nuevo { background: rgba(168,196,212,0.3); color: #3a7a99; }
  .tag-popular { background: rgba(200,132,63,0.15); color: var(--caramel); }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
    display: none;
    grid-column: 1/-1;
  }

  .empty-state .empty-emoji { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }

  /* ─── WA FLOATING ─── */
  .wa-float {
    position: fixed;
    bottom: 24px;
    right: 20px;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 8px;
  }

  .wa-float-btn {
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: #25D366;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 28px;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(37,211,102,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: pulse 2.5s ease infinite;
  }

  .wa-float-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 28px rgba(37,211,102,0.5);
  }

  .wa-float-label {
    background: var(--chocolate);
    color: white;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    white-space: nowrap;
    font-weight: 500;
    opacity: 0;
    transform: translateX(10px);
    transition: all 0.2s;
    pointer-events: none;
  }

  .wa-float:hover .wa-float-label {
    opacity: 1;
    transform: translateX(0);
  }

  /* ─── NO RESULTS ─── */
  .no-results {
    display: none;
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
    grid-column: 1/-1;
  }

  /* ─── FOOTER ─── */
  footer {
    text-align: center;
    padding: 32px 20px 100px;
    color: var(--text-soft);
    font-size: 13px;
  }

  footer a {
    color: var(--terracotta);
    text-decoration: none;
    font-weight: 500;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, var(--blush), var(--terracotta));
    border-radius: 4px;
    margin: 24px auto 0;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 6px 20px rgba(37,211,102,0.4); }
    50%       { box-shadow: 0 6px 28px rgba(37,211,102,0.65); }
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,21,16,0.5);
    backdrop-filter: blur(4px);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--warm-white);
    border-radius: 28px 28px 0 0;
    padding: 28px 24px 48px;
    width: 100%;
    max-width: 480px;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px;
    height: 4px;
    background: rgba(61,31,26,0.15);
    border-radius: 4px;
    margin: 0 auto 20px;
  }

  .modal-emoji { font-size: 52px; text-align: center; margin-bottom: 12px; }
  .modal-name {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--chocolate);
    text-align: center;
    margin-bottom: 6px;
  }

  .modal-desc {
    text-align: center;
    color: var(--text-soft);
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 16px;
    font-weight: 300;
  }

  .modal-price {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--terracotta);
    text-align: center;
    margin-bottom: 20px;
  }

  .modal-wa {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px;
    background: #25D366;
    color: white;
    border: none;
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.2s, transform 0.2s;
  }

  .modal-wa:hover { background: #1db954; transform: scale(1.02); }

  .modal-close {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    padding: 13px;
    background: transparent;
    color: var(--text-soft);
    border: 1.5px solid rgba(61,31,26,0.12);
    border-radius: 50px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    cursor: pointer;
    margin-top: 10px;
    transition: border-color 0.2s;
  }

  .modal-close:hover { border-color: var(--dusty-rose); color: var(--terracotta); }
</style>
</head>
<body>
<main>

  <!-- HEADER -->
  <header>
    <div class="logo-wrap">
      <img src="https://dulcebebauy.github.io/carta/images/logo.png"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"
           alt="Dulce Beba">
      <div class="logo-fallback" style="display:none;">🩵</div>
    </div>
    <h1>Dulce Beba</h1>
    <p class="tagline">Cafetería & Pastelería</p>
  </header>

  <!-- SEARCH -->
  <div class="search-wrap">
    <div class="search-container">
      <span class="search-icon">🔍</span>
      <input class="search-box" type="text" placeholder="Buscar en la carta…" id="searchInput" autocomplete="off">
    </div>
  </div>

  <!-- CATEGORIES -->
  <div class="cats-wrap">
    <div class="cats" id="catContainer">
      <button class="cat-btn active" data-cat="todo">🩵 Todo</button>
      <button class="cat-btn" data-cat="calientes">☕ Bebidas calientes</button>
      <button class="cat-btn" data-cat="frias">🍹 Bebidas frías</button>
      <button class="cat-btn" data-cat="dulce">🍪 Dulce</button>
      <button class="cat-btn" data-cat="salado">🥪 Salado</button>
      <button class="cat-btn" data-cat="tortas">🍰 Tortas</button>
      <button class="cat-btn" data-cat="postres">🍮 Postres</button>
      <button class="cat-btn" data-cat="meriendas">🧁 Meriendas</button>
      <button class="cat-btn" data-cat="eventos">⭐ Eventos</button>
    </div>
  </div>

  <!-- FEATURED -->
  <div class="featured-strip" id="featuredSection">
    <p class="featured-label">⭐ Destacados del día</p>
    <div class="featured-cards">
      <div class="feat-card" onclick="openModal('cappuccino')">
        <span class="feat-emoji">☕</span>
        <div class="feat-name">Cappuccino artesanal</div>
        <div class="feat-price">$180</div>
        <div class="feat-badge">🔥 Popular</div>
      </div>
      <div class="feat-card" onclick="openModal('torta-choco')" style="background:linear-gradient(135deg,#C8843F,#D4897A)">
        <span class="feat-emoji">🍰</span>
        <div class="feat-name">Torta de chocolate</div>
        <div class="feat-price">$320</div>
        <div class="feat-badge">✨ Nuevo</div>
      </div>
      <div class="feat-card" onclick="openModal('medialunas')" style="background:linear-gradient(135deg,#8FAF8A,#A8C4D4)">
        <span class="feat-emoji">🥐</span>
        <div class="feat-name">Medialunas x4</div>
        <div class="feat-price">$220</div>
        <div class="feat-badge">💛 Del día</div>
      </div>
    </div>
  </div>

  <!-- PRODUCTS -->
  <p class="section-title" id="sectionTitle">Toda la carta</p>
  <div class="products" id="productGrid"></div>

</main>

<!-- WA FLOAT -->
<div class="wa-float">
  <div class="wa-float-label">¡Hacé tu pedido!</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-handle"></div>
    <div class="modal-emoji" id="mEmoji"></div>
    <div class="modal-name" id="mName"></div>
    <div class="modal-desc" id="mDesc"></div>

let products = [];

async function loadData(){
  try{
    const res = await fetch(SHEET_URL);
    const text = await res.text();

    // Convert CSV a JSON simple
    //const rows = text.split(",").slice(1);
    const rows = text.split("\r\n");
    //const products = text.split("\r\n");
    
    products = rows.map(row => {
      const [id,name,price,img,cat] = row.split(",");
      return { id, name, price, img, cat,emoji:'☕' };
    }).filter(i=>i.id);
    
    //renderProducts();
  }catch(e){
    console.error("Error cargando Google Sheets", e);
  }
}

  postres:'Postres',

function waUrl(productName) {
  const msg = encodeURIComponent(`¡Hola! Me gustaría pedir: *${productName}* 😊`);

}

  const title = document.getElementById('sectionTitle');

    const inSearch = !q || p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
    return inCat && inSearch;
  });

  title.textContent = catLabels[currentCat] || 'Toda la carta';

// Categories
document.getElementById('catContainer').addEventListener('click', e => {
  const btn = e.target.closest('.cat-btn');
  if (!btn) return;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  searchQuery = '';
  document.getElementById('searchInput').value = '';
  renderProducts();
});

// Search
document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  if (searchQuery) {
    currentCat = 'todo';
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-cat="todo"]').classList.add('active');
  }
  renderProducts();
});

// Modal
function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mName').textContent = p.name;
  document.getElementById('mDesc').textContent = p.desc;
  document.getElementById('mPrice').textContent = p.price;
  document.getElementById('mWaBtn').href = waUrl(p.name);
  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}
